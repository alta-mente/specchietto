<!-- @dsCard group="Components" viewport="700x230" name="Icons (Lucide)" subtitle="Lucide set — the brand's iconography, 2px rounded stroke" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:26px 28px;background:var(--surface-card);font-family:var(--font-sans)}
  .wrap{display:grid;grid-template-columns:repeat(10,1fr);gap:18px 12px}
  .ico{display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--ink-800)}
  .ico small{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);text-align:center}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Icon } = window.FicodindiaDesignSystem_613bb9;
const NAMES = ['calendar-days','clock','users','user-plus','phone','mail','map-pin','utensils-crossed',
  'armchair','layout-grid','list','search','bell','star','heart','gift','wine','sliders-horizontal',
  'check','x','plus','pencil','trash-2','message-square','settings','log-out','chevron-right','sparkles','credit-card','table-2'];
function Demo() {
  return (
    <div className="wrap">
      {NAMES.map(n => (
        <div className="ico" key={n}>
          <Icon name={n} size={22} />
          <small>{n}</small>
        </div>
      ))}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
