<!-- @dsCard group="Components" viewport="700x360" name="Buttons" subtitle="Button variants, sizes, icons, states + IconButton" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;padding:26px 28px;background:var(--surface-card);font-family:var(--font-sans)}
  .grid{display:flex;flex-direction:column;gap:18px}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);width:74px;flex-shrink:0}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Button, IconButton, Icon } = window.FicodindiaDesignSystem_613bb9;
function Demo() {
  return (
    <div className="grid">
      <div className="row">
        <span className="lbl">Variant</span>
        <Button variant="primary">Primario</Button>
        <Button variant="accent">Conferma</Button>
        <Button variant="secondary">Annulla</Button>
        <Button variant="ghost">Ghost</Button>
        <Button variant="danger">Elimina</Button>
      </div>
      <div className="row">
        <span className="lbl">Size</span>
        <Button size="sm" variant="accent">Small</Button>
        <Button size="md" variant="accent">Medium</Button>
        <Button size="lg" variant="accent">Large</Button>
      </div>
      <div className="row">
        <span className="lbl">Icon</span>
        <Button variant="primary" iconLeft={<Icon name="calendar-days" size={18} />}>Nuova prenotazione</Button>
        <Button variant="secondary" iconRight={<Icon name="arrow-right" size={18} />}>Avanti</Button>
        <Button variant="accent" iconLeft={<Icon name="check" size={18} />}>Conferma</Button>
      </div>
      <div className="row">
        <span className="lbl">State</span>
        <Button variant="primary" loading>Invio</Button>
        <Button variant="primary" disabled>Disabilitato</Button>
        <Button variant="accent" disabled>Disabilitato</Button>
      </div>
      <div className="row">
        <span className="lbl">Icon&nbsp;btn</span>
        <IconButton variant="ghost" label="Modifica"><Icon name="pencil" size={18} /></IconButton>
        <IconButton variant="soft" label="Filtra"><Icon name="sliders-horizontal" size={18} /></IconButton>
        <IconButton variant="outline" label="Cerca"><Icon name="search" size={18} /></IconButton>
        <IconButton variant="solid" round label="Aggiungi"><Icon name="plus" size={18} /></IconButton>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
